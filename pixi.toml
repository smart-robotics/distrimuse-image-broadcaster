[workspace]
authors = ["dmartins <dmartins@smart-robotics.nl>"]
channels = ["robostack-kilted", "conda-forge"]
name = "cam_recorder"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
PYTHONPATH = "${PIXI_PROJECT_ROOT}/src:${PYTHONPATH}"
RMW_IMPLEMENTATION = "rmw_cyclonedds_cpp"
CYCLONEDDS_URI = "file://${PIXI_PROJECT_ROOT}/config/cyclonedds.xml"

[tasks]
broadcast = "python -m cam_recorder.broadcaster"
replay = "python -m cam_recorder.replay"
view = "python -m cam_recorder.viewer"
test = "pytest tests/ -v"

[dependencies]
python = ">=3.11"
ros-kilted-rclpy = "*"
ros-kilted-sensor-msgs = "*"
ros-kilted-cv-bridge = "*"
ros-kilted-rosbag2-py = "*"
ros-kilted-rosbag2-storage-mcap = "*"
ros-kilted-ros-base = "*"
opencv = "*"
numpy = "*"
pytest = "*"
pyyaml = "*"
